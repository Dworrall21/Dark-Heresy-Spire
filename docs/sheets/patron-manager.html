  <style>
    :root{--bg:#f4f0e7;--panel:#fffdf8;--ink:#211f1b;--muted:#6d6559;--line:#cec2b0;--accent:#7d2b28;--accent2:#2e6070;--good:#2a654d;--warn:#94620d;--bad:#9a2822;--shadow:0 12px 28px rgba(40,32,22,.12);--radius:8px;--focus:0 0 0 3px rgba(125,43,40,.18)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}button,input,select,textarea{font:inherit}button{min-height:2.25rem;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:.42rem .72rem;cursor:pointer}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}button.danger{color:var(--bad);border-color:rgba(154,40,34,.35)}button:focus-visible,input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:.5rem .58rem}textarea{min-height:4.5rem;resize:vertical}label{display:grid;gap:.28rem;color:var(--muted);font-size:.82rem;font-weight:700}label input,label select,label textarea{color:var(--ink);font-weight:500}.app-header{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.75rem 1rem;background:rgba(244,240,231,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:1.28rem;line-height:1.1}.brand p{margin:.12rem 0 0;color:var(--muted);font-size:.82rem}.toolbar{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:flex-end;align-items:center}.save-status{min-width:8.5rem;color:var(--muted);font-size:.84rem;text-align:right}.app-shell{display:grid;grid-template-columns:15rem minmax(0,1fr);gap:1rem;max-width:1500px;margin:0 auto;padding:1rem}.sidebar{position:sticky;top:5.15rem;align-self:start;max-height:calc(100vh - 6rem);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:.65rem}.sidebar a{display:block;color:var(--ink);text-decoration:none;padding:.45rem .55rem;border-radius:5px;font-size:.92rem}.sidebar a:hover{background:#eee7dc}.mobile-nav{display:none;margin:0 1rem 1rem}main{display:grid;gap:1rem;min-width:0}section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;scroll-margin-top:5.25rem}section h2{margin:0 0 .85rem;font-family:Georgia,"Times New Roman",serif;font-size:1.25rem;line-height:1.15}h3{margin:1rem 0 .55rem;font-size:1rem}.section-intro{margin:-.35rem 0 .85rem;color:var(--muted);font-size:.93rem}.grid{display:grid;gap:.75rem}.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.track-layout{display:grid;grid-template-columns:minmax(18rem,.8fr) minmax(22rem,1.2fr);gap:1rem;align-items:start}.box{border:1px solid var(--line);border-radius:var(--radius);background:#fbf7ee;padding:.8rem}.box h3{margin-top:0}.number-track{display:grid;gap:.25rem;margin-bottom:.7rem}.notice-track{grid-template-columns:repeat(4,minmax(2.4rem,1fr))}.patience-track{grid-template-columns:repeat(7,minmax(2.2rem,1fr))}.number-track button{min-height:2rem;padding:.15rem;background:#f8f4ec}.number-track button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:900}.state-line{display:flex;align-items:baseline;justify-content:space-between;gap:.75rem;margin-bottom:.7rem}.state-line strong{font-family:Georgia,"Times New Roman",serif;font-size:1.4rem}.state-line span{color:var(--muted);font-weight:800}.ref-list{display:grid;gap:.45rem;margin:0;padding:0;list-style:none}.ref-list li{border-left:3px solid var(--accent2);background:rgba(46,96,112,.08);padding:.4rem .55rem;font-size:.9rem}.validation{display:grid;gap:.4rem;margin-top:.75rem}.validation p{margin:0;padding:.45rem .55rem;border-radius:6px;border:1px solid transparent;font-size:.9rem}.validation .ok{color:var(--good);border-color:rgba(42,101,77,.25);background:rgba(42,101,77,.08)}.validation .warn{color:var(--warn);border-color:rgba(148,98,13,.25);background:rgba(148,98,13,.1)}.validation .bad{color:var(--bad);border-color:rgba(154,40,34,.25);background:rgba(154,40,34,.08)}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}table{width:100%;min-width:760px;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:.45rem;text-align:left;vertical-align:top}th{background:#f0e9dd;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.02em}tr:last-child td{border-bottom:0}td.actions{width:1%;white-space:nowrap}td.check-cell{text-align:center}td.check-cell input{width:1.05rem;height:1.05rem}.row-actions,.section-tools{display:flex;justify-content:flex-end;gap:.45rem;margin-top:.55rem;flex-wrap:wrap}.section-tools{margin:-.25rem 0 .75rem}.die-control{display:grid;grid-template-columns:2.2rem minmax(4.3rem,1fr) 2.2rem;gap:.25rem;align-items:center}.die-control button{min-height:2.15rem;padding:.2rem;font-weight:900}.notes-area textarea{min-height:12rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92rem}.hidden-input{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none}@media(max-width:980px){.app-header{align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.save-status{text-align:left}.app-shell{grid-template-columns:1fr;padding-top:0}.sidebar{display:none}.mobile-nav{display:block}.track-layout,.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}}@media(max-width:620px){.toolbar button{flex:1 1 9rem}section{padding:.75rem}.notice-track,.patience-track{grid-template-columns:repeat(4,minmax(2.2rem,1fr))}}@media print{:root{--bg:#fff;--panel:#fff;--ink:#000;--muted:#333;--line:#888;--shadow:none}body{background:#fff}.app-header,.sidebar,.mobile-nav,.section-tools,.row-actions,.actions,.no-print{display:none!important}.app-shell{display:block;max-width:none;padding:0}section{break-inside:avoid;box-shadow:none;border-radius:0;margin:0 0 .35in;padding:.15in 0}input,select,textarea{border:0;padding:0;min-height:auto}.number-track button{display:none}.number-track button.active{display:inline-block;color:#000;background:#fff;font-weight:900}.table-wrap{border:0;overflow:visible}table{min-width:0;font-size:9pt}.box{break-inside:avoid}}
  </style>
</head>
<body>
  <header class="app-header"><div class="brand"><h1>Patron Manager</h1><p>Dark Heresy Spire authority, pressure, and mystery sheet</p></div><div class="toolbar no-print"><span class="save-status" id="saveStatus">Ready</span><button id="saveNow" type="button">Save</button><button id="exportJson" type="button">Export JSON</button><button id="importJson" type="button">Import JSON</button><button id="printSheet" type="button">Print</button><button id="newSheet" class="danger" type="button">New / Clear</button><input class="hidden-input" id="importFile" type="file" accept="application/json,.json"></div></header>
  <select class="mobile-nav no-print" id="mobileNav" aria-label="Jump to section"></select>
  <div class="app-shell"><nav class="sidebar no-print" id="sidebar" aria-label="Sheet sections"></nav><main id="app"></main></div>
  <script>
    (function(){
      "use strict";
      var STORAGE_KEY="dhspire.patron.v1",DICE=["","D3","D6","D8","D10"],ORDOS=["Hereticus","Xenos","Malleus","Obscure"],PHILOSOPHIES=["Puritan","Radical","Amalathian","Recongregator","Monodominant","Xanthite","Oblationist","Istvaanian"],METHODS=["Blackmail","Purge","Infiltration","Experimentation","Containment","Exploitation","Martyrdom","Denial"];
      var ORDO_INFO={Hereticus:"Heresy, Imperium, Ecclesiarchy, Inquisition. Root out internal rot without creating public sympathy.",Xenos:"Xenos, Void, Inquisition, Mechanicus. Contain or destroy alien influence before it becomes useful.",Malleus:"Warp, Heresy, Inquisition, Ecclesiarchy. Never reveal the full truth of the daemonic.",Obscure:"Varies. Never let outsiders learn this Ordo exists."};
      var PHIL_INFO={Puritan:"Radical methods mark Patron Notice.",Radical:"Forbidden Methods are easier to justify; Puritan authorities become more dangerous.",Amalathian:"Lose Patience when institutions are destabilized.",Recongregator:"Lose Patience when the cell preserves corrupt authority.",Monodominant:"Mercy toward mutants, xenos, or witches risks Authority stress.",Xanthite:"Daemonological methods gain power but create Corruption evidence.",Oblationist:"Severe Radical Beats impress the Patron; Humanity Beats may be weakness.",Istvaanian:"Escalation may be rewarded; de-escalation may displease the Patron."};
      var BOONS=[["Spy Network","D8","Surveillance, informants, rumors, counter-surveillance"],["Restricted Archive","D8","Forbidden casefiles, sealed histories, threat patterns"],["Cover Story","D6","Plausible operational fiction"],["Sanctum Obscurus","D8","Safehouse, vault, hidden base"],["Adeptus Arbites Ties","D8","Cordons, arrests, records, armed backup"],["Kill-Team Sanction","D10","Elite violence, extraction, overwhelming force"],["Voidship Access","D8","Transit, extraction, orbital scan, quarantine"],["Forbidden Archive","D8","Daemonology, xenology, heretek lore"],["Plausible Deniability","D8","Cleanup, scapegoats, reduced Heat"],["Forbidden Specialist","D6","Dangerous expert or sanctioned monster"]];
      var LIABILITIES=["Demands Discretion","Hidden Philosophy","Enemy Inquisitor","Paranoid","Loose Cannon","Offended Faction","Sanction Denied","Tainted Asset","Meticulous Archivist","Rumoured Dead","Suspect","Debts Owed","Nemesis","Hallowed Ignorance","Plausible Betrayal"];
      var PATRON_MOVES=["Commendation: Gain a D8 Requisition for the next Operation.","Correction: The Patron issues a new restriction or Red Line.","Audit: A savant, Interrogator, servo-skull, confessor, or rival acolyte observes the cell.","Escalation: The threat is worse than stated. Heat increases by 1.","Demand: The Patron requires a prisoner, artifact, confession, corpse, clean record, or scapegoat.","Suspicion: Radical acolytes mark D3 Authority or Shadow stress.","Doctrine: The Patron forbids one method and endorses another.","Requisition Freeze: One Boon cannot be used until the cell explains itself.","Rival Cell: Another cell is assigned to the same theater.","Forbidden Offer: A powerful but compromising solution appears."];
      var JUDGMENTS=["Reindoctrination: One acolyte is recalled, conditioned, punished, or examined.","Disavowal: The cell loses Limitless Authority until trust is restored.","Sacrificial Order: An order will cost a Bond, Cover, or Resource.","Replacement Cell: A rival team arrives with authority to supersede the PCs.","Purge Protocol: The Patron authorizes force against assets, witnesses, or allies.","Excommunication Threat: Next Severe Authority or Corruption fallout may become Critical."];
      var SECTIONS=[["guide","Guide"],["identity","Identity"],["wants","Wants"],["boons","Boons"],["liabilities","Liabilities"],["notice","Notice & Patience"],["red-lines","Red Lines"],["debrief","Debrief"],["notes","Notes"]];
      var state=loadState(),timer=null,fieldCounter=0;
      function def(){return{identity:{name:"",title:"",ordo:"",philosophy:"",method:"",mandate:"",standingOrder:"",forbiddenOffer:"",rival:"",secret:""},wants:[["What do they want preserved?",""],["What would they burn?",""],["What do they believe is happening?",""],["What is actually happening?",""],["What would they condemn?",""],["What would they secretly approve?",""]].map(function(x){return{question:x[0],answer:x[1]}}),boons:[{boon:"Limitless Authority",die:"D8",use:"Invoke Inquisitorial authority, requisition aid, seize access",cost:"Heat, Authority stress, Shadow stress, Patron Notice, Liability"},{boon:"",die:"D6",use:"",cost:""},{boon:"",die:"D6",use:"",cost:""},{boon:"",die:"D6",use:"",cost:""}],liabilities:[{liability:"",trigger:"",effect:""},{liability:"",trigger:"",effect:""},{liability:"",trigger:"",effect:""}],notice:0,patience:4,redLines:[{line:"Do not do this.",crossed:""},{line:"Do not be seen doing this.",crossed:""},{line:"Do not let anyone learn I ordered this.",crossed:""}],debrief:[["What did the cell accomplish?",""],["What did the cell conceal?",""],["What did the cell lose?",""],["What did the Patron approve of?",""],["What did the Patron condemn?",""],["What proof does the cell bring?",""],["What proof is missing?",""]].map(function(x){return{question:x[0],answer:x[1]}}),debriefResult:"",notes:""}}
      function loadState(){try{var raw=localStorage.getItem(STORAGE_KEY);if(raw){var p=JSON.parse(raw);if(p&&p.patron)return merge(def(),p.patron)}}catch(e){console.warn(e)}return def()}
      function merge(a,b){Object.keys(b||{}).forEach(function(k){if(Array.isArray(b[k]))a[k]=b[k];else if(b[k]&&typeof b[k]==="object"&&a[k]&&typeof a[k]==="object"&&!Array.isArray(a[k]))a[k]=merge(a[k],b[k]);else a[k]=b[k]});return a}
      function save(manual){localStorage.setItem(STORAGE_KEY,JSON.stringify({version:1,updatedAt:new Date().toISOString(),patron:state}));status(manual?"Saved now":"Auto-saved")}
      function schedule(){status("Unsaved changes");clearTimeout(timer);timer=setTimeout(function(){save(false)},350)}function status(t){document.getElementById("saveStatus").textContent=t}
      function get(path){return path.split(".").reduce(function(o,k){return o?o[k]:undefined},state)}function set(path,val){var p=path.split("."),o=state;for(var i=0;i<p.length-1;i++)o=o[p[i]];o[p[p.length-1]]=val;schedule();dynamic()}
      function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function slug(v){return String(v).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}
      function opts(list,selected,blank){var h=blank?'<option value=""></option>':"";list.forEach(function(o){var v=Array.isArray(o)?o[0]:o,l=Array.isArray(o)?o[1]:o;h+='<option value="'+esc(v)+'"'+(String(v)===String(selected)?" selected":"")+">"+esc(l)+"</option>"});return h}
      function field(label,path,type,options){var val=get(path)||"",id="f-"+slug(path)+"-"+fieldCounter++;if(type==="textarea")return'<label for="'+id+'"><span>'+esc(label)+'</span><textarea id="'+id+'" data-path="'+esc(path)+'">'+esc(val)+'</textarea></label>';if(type==="select")return'<label for="'+id+'"><span>'+esc(label)+'</span><select id="'+id+'" data-path="'+esc(path)+'">'+opts(options,val,true)+'</select></label>';return'<label for="'+id+'"><span>'+esc(label)+'</span><input id="'+id+'" data-path="'+esc(path)+'" value="'+esc(val)+'"></label>'}
      function render(){fieldCounter=0;document.getElementById("sidebar").innerHTML=SECTIONS.map(function(s){return'<a href="#'+s[0]+'">'+s[1]+"</a>"}).join("");document.getElementById("mobileNav").innerHTML='<option value="">Jump to section</option>'+SECTIONS.map(function(s){return'<option value="'+s[0]+'">'+s[1]+"</option>"}).join("");document.getElementById("app").innerHTML=guide()+identity()+wants()+boons()+liabilities()+notice()+redLines()+debrief()+notes();bind();dynamic()}
      function guide(){return'<section id="guide"><h2>Patron Guide</h2><div class="track-layout"><div class="box"><h3>Build Helpers</h3><div class="grid">'+field("Ordo","identity.ordo","select",ORDOS)+field("Public Philosophy","identity.philosophy","select",PHILOSOPHIES)+field("Private Method","identity.method","select",METHODS)+'<div class="section-tools"><button class="primary" type="button" data-action="apply-guide">Apply Guide Text</button><button type="button" data-action="add-boon">Add Example Boon</button><button type="button" data-action="add-liability">Add Example Liability</button></div></div><div id="validation" class="validation"></div></div><div class="box"><h3>Current Pressure</h3><ul class="ref-list" id="guideText"></ul></div></div></section>'}
      function identity(){return'<section id="identity"><h2>Patron Identity</h2><div class="grid cols-4">'+field("Name","identity.name")+field("Title","identity.title")+field("Ordo","identity.ordo","select",ORDOS)+field("Public Philosophy","identity.philosophy","select",PHILOSOPHIES)+field("Private Method","identity.method","select",METHODS)+field("Mandate","identity.mandate")+field("Standing Order","identity.standingOrder","textarea")+field("Forbidden Offer","identity.forbiddenOffer","textarea")+field("Rival","identity.rival")+field("Secret","identity.secret","textarea")+'</div></section>'}
      function wants(){return'<section id="wants"><h2>What the Patron Wants</h2>'+table("wants",[["question","Question"],["answer","Answer","textarea"]],{add:"Add Want"})+"</section>"}
      function boons(){return'<section id="boons"><h2>Patron Boons</h2><div class="section-tools"><button type="button" data-action="add-boon">Add Example Boon</button></div>'+table("boons",[["boon","Boon"],["die","Die","die"],["use","Use"],["cost","Cost / Risk"]],{add:"Add Boon"})+"</section>"}
      function liabilities(){return'<section id="liabilities"><h2>Patron Liabilities</h2><p class="section-intro">When a Liability triggers: make a roll Risky or Dangerous, Heat +1, mark stress, step down a Boon, issue an order, or reveal a cost.</p><div class="section-tools"><button type="button" data-action="add-liability">Add Example Liability</button></div>'+table("liabilities",[["liability","Liability"],["trigger","Trigger"],["effect","Effect"]],{add:"Add Liability"})+"</section>"}
      function notice(){return'<section id="notice"><h2>Patron Notice & Patience</h2><div class="track-layout"><div class="box"><h3>Patron Notice</h3><div class="state-line"><strong>'+state.notice+'</strong><span>At 3, make a Patron Move</span></div><div class="number-track notice-track">'+[0,1,2,3].map(function(i){return'<button type="button" data-number="notice" data-value="'+i+'" class="'+(state.notice===i?"active":"")+'">'+i+"</button>"}).join("")+'</div><h3>Patience</h3><div class="state-line"><strong>'+state.patience+'</strong><span>At 0, Judgment</span></div><div class="number-track patience-track">'+[0,1,2,3,4,5,6].map(function(i){return'<button type="button" data-number="patience" data-value="'+i+'" class="'+(state.patience===i?"active":"")+'">'+i+"</button>"}).join("")+'</div></div><div class="box"><h3>Moves</h3><ul class="ref-list" id="moveList"></ul></div></div></section>'}
      function redLines(){return'<section id="red-lines"><h2>Red Lines</h2>'+table("redLines",[["line","Red Line"],["crossed","If Crossed"]],{add:"Add Red Line"})+"</section>"}
      function debrief(){return'<section id="debrief"><h2>Patron Debrief</h2>'+table("debrief",[["question","Question"],["answer","Answer","textarea"]],{add:"Add Debrief Question"})+'<h3>Debrief Result</h3>'+field("Result / Effect","debriefResult","textarea")+"</section>"}
      function notes(){return'<section id="notes" class="notes-area"><h2>Patron Notes</h2>'+field("Notes","notes","textarea")+"</section>"}
      function table(path,cols,options){var rows=get(path)||[],h='<div class="table-wrap"><table><thead><tr>'+cols.map(function(c){return"<th>"+esc(c[1])+"</th>"}).join("")+'<th class="actions">Actions</th></tr></thead><tbody>';rows.forEach(function(r,i){h+="<tr>"+cols.map(function(c){var key=c[0],type=c[2]||"input",cell=path+"."+i+"."+key,val=r[key];if(type==="textarea")return'<td><textarea data-path="'+esc(cell)+'">'+esc(val||"")+"</textarea></td>";if(type==="select")return'<td><select data-path="'+esc(cell)+'">'+opts(c[3],val,false)+"</select></td>";if(type==="die")return"<td>"+die(cell,val||"")+"</td>";return'<td><input data-path="'+esc(cell)+'" value="'+esc(val||"")+'"></td>'}).join("")+'<td class="actions"><button class="danger" type="button" data-remove-row="'+esc(path)+'" data-index="'+i+'">Remove</button></td></tr>'});return h+'</tbody></table></div><div class="row-actions"><button type="button" data-add-row="'+esc(path)+'">'+esc(options.add||"Add Row")+"</button></div>"}
      function die(path,val){return'<div class="die-control"><button type="button" data-die-step="'+esc(path)+'" data-dir="-1">-</button><select data-path="'+esc(path)+'">'+opts(DICE,val,false)+'</select><button type="button" data-die-step="'+esc(path)+'" data-dir="1">+</button></div>'}
      function bind(){document.querySelectorAll("[data-path]").forEach(function(el){el.addEventListener("input",function(){set(el.getAttribute("data-path"),el.value)});el.addEventListener("change",function(){set(el.getAttribute("data-path"),el.value);render()})});document.querySelectorAll("[data-number]").forEach(function(b){b.addEventListener("click",function(){state[b.getAttribute("data-number")]=Number(b.getAttribute("data-value"));schedule();render()})});document.querySelectorAll("[data-die-step]").forEach(function(b){b.addEventListener("click",function(){stepDie(b.getAttribute("data-die-step"),Number(b.getAttribute("data-dir")))})});document.querySelectorAll("[data-add-row]").forEach(function(b){b.addEventListener("click",function(){addRow(b.getAttribute("data-add-row"))})});document.querySelectorAll("[data-remove-row]").forEach(function(b){b.addEventListener("click",function(){removeRow(b.getAttribute("data-remove-row"),Number(b.getAttribute("data-index")))})});document.querySelectorAll("[data-action]").forEach(function(b){b.addEventListener("click",function(){action(b.getAttribute("data-action"))})})}
      function dynamic(){var msgs=[];if(!state.identity.name)msgs.push(["warn","Patron name is empty."]);if(!state.identity.ordo)msgs.push(["warn","Ordo is not set."]);if(!state.identity.philosophy)msgs.push(["warn","Public Philosophy is not set."]);if(!state.identity.method)msgs.push(["warn","Private Method is not set."]);if(state.notice>=3)msgs.push(["bad","Patron Notice is at 3. Make a Patron Move, then clear Notice."]);if(state.patience<=0)msgs.push(["bad","Patience is 0. Make a Judgment Move."]);if(!msgs.length)msgs.push(["ok","Patron checks look solid."]);var v=document.getElementById("validation");if(v)v.innerHTML=msgs.map(function(m){return'<p class="'+m[0]+'">'+esc(m[1])+"</p>"}).join("");var gt=document.getElementById("guideText");if(gt){var arr=[];if(state.identity.ordo)arr.push("Ordo: "+(ORDO_INFO[state.identity.ordo]||""));if(state.identity.philosophy)arr.push("Philosophy: "+(PHIL_INFO[state.identity.philosophy]||""));if(state.identity.method)arr.push("Private Method: Acting through "+state.identity.method+" can grant Mastery once per Operation, but marks Patron Notice.");if(!arr.length)arr.push("Choose Ordo, Philosophy, and Private Method to see pressure guidance.");gt.innerHTML=arr.map(function(x){return"<li>"+esc(x)+"</li>"}).join("")}var ml=document.getElementById("moveList");if(ml){var list=state.patience<=0?JUDGMENTS:(state.notice>=3?PATRON_MOVES:["Patron Moves appear here when Notice reaches 3. Judgment Moves appear when Patience reaches 0."]);ml.innerHTML=list.map(function(x){return"<li>"+esc(x)+"</li>"}).join("")}}
      function action(a){if(a==="apply-guide"){if(state.identity.ordo&&!state.identity.mandate)state.identity.mandate=ORDO_INFO[state.identity.ordo];if(state.identity.method&&!state.identity.standingOrder)state.identity.standingOrder="Act through "+state.identity.method+" when discretion fails.";schedule();render()}if(a==="add-boon"){var used=state.boons.map(function(b){return b.boon}),b=BOONS.find(function(x){return used.indexOf(x[0])<0})||BOONS[0];state.boons.push({boon:b[0],die:b[1],use:b[2],cost:"Heat, Patron Notice, stress, faction attention, or step-down when exposed."});schedule();render()}if(a==="add-liability"){var used=state.liabilities.map(function(l){return l.liability}),l=LIABILITIES.find(function(x){return used.indexOf(x)<0})||LIABILITIES[0];state.liabilities.push({liability:l,trigger:"When this pressure becomes relevant.",effect:"Heat +1, stress, order, Boon step-down, or a new complication."});schedule();render()}}
      function template(path){var t={wants:{question:"",answer:""},boons:{boon:"",die:"D6",use:"",cost:""},liabilities:{liability:"",trigger:"",effect:""},redLines:{line:"",crossed:""},debrief:{question:"",answer:""}};return JSON.parse(JSON.stringify(t[path]||{}))}
      function addRow(p){get(p).push(template(p));schedule();render()}function removeRow(p,i){get(p).splice(i,1);schedule();render()}function stepDie(p,d){var cur=get(p)||"",i=DICE.indexOf(cur);if(i<0)i=0;i=Math.max(0,Math.min(DICE.length-1,i+d));set(p,DICE[i]);render()}
      function exportJson(){save(true);var blob=new Blob([JSON.stringify({version:1,updatedAt:new Date().toISOString(),patron:state},null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a"),name=state.identity.name?state.identity.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""):"patron";a.href=url;a.download=name+".json";a.click();URL.revokeObjectURL(url)}
      function importJson(file){var r=new FileReader();r.onload=function(){try{var p=JSON.parse(r.result);state=merge(def(),p.patron||p);save(true);render()}catch(e){alert("Import failed: this does not look like valid patron JSON.")}};r.readAsText(file)}
      document.getElementById("saveNow").addEventListener("click",function(){save(true)});document.getElementById("exportJson").addEventListener("click",exportJson);document.getElementById("importJson").addEventListener("click",function(){document.getElementById("importFile").click()});document.getElementById("importFile").addEventListener("change",function(e){if(e.target.files&&e.target.files[0])importJson(e.target.files[0]);e.target.value=""});document.getElementById("printSheet").addEventListener("click",function(){window.print()});document.getElementById("newSheet").addEventListener("click",function(){if(confirm("Clear this patron from the browser and start fresh? Export first if you want a backup.")){state=def();save(true);render()}});document.getElementById("mobileNav").addEventListener("change",function(e){if(e.target.value)document.getElementById(e.target.value).scrollIntoView();e.target.value=""});
      render();save(false);
    })();
  </script>
