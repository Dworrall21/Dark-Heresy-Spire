<html lang="en">
<head>

  <style>
    :root{--bg:#f4f0e7;--panel:#fffdf8;--ink:#211f1b;--muted:#6d6559;--line:#cec2b0;--accent:#7d2b28;--accent2:#2e6070;--good:#2a654d;--warn:#94620d;--bad:#9a2822;--shadow:0 12px 28px rgba(40,32,22,.12);--radius:8px;--focus:0 0 0 3px rgba(125,43,40,.18)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}button,input,select,textarea{font:inherit}button{min-height:2.25rem;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:.42rem .72rem;cursor:pointer}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}button.danger{color:var(--bad);border-color:rgba(154,40,34,.35)}button:focus-visible,input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:.5rem .58rem}textarea{min-height:4.5rem;resize:vertical}label{display:grid;gap:.28rem;color:var(--muted);font-size:.82rem;font-weight:700}label input,label select,label textarea{color:var(--ink);font-weight:500}.app-header{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.75rem 1rem;background:rgba(244,240,231,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:1.28rem;line-height:1.1}.brand p{margin:.12rem 0 0;color:var(--muted);font-size:.82rem}.toolbar{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:flex-end;align-items:center}.save-status{min-width:8.5rem;color:var(--muted);font-size:.84rem;text-align:right}.app-shell{display:grid;grid-template-columns:15rem minmax(0,1fr);gap:1rem;max-width:1500px;margin:0 auto;padding:1rem}.sidebar{position:sticky;top:5.15rem;align-self:start;max-height:calc(100vh - 6rem);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:.65rem}.sidebar a{display:block;color:var(--ink);text-decoration:none;padding:.45rem .55rem;border-radius:5px;font-size:.92rem}.sidebar a:hover{background:#eee7dc}.mobile-nav{display:none;margin:0 1rem 1rem}main{display:grid;gap:1rem;min-width:0}section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;scroll-margin-top:5.25rem}section h2{margin:0 0 .85rem;font-family:Georgia,"Times New Roman",serif;font-size:1.25rem;line-height:1.15}h3{margin:1rem 0 .55rem;font-size:1rem}.section-intro{margin:-.35rem 0 .85rem;color:var(--muted);font-size:.93rem}.grid{display:grid;gap:.75rem}.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.track-layout{display:grid;grid-template-columns:minmax(18rem,.8fr) minmax(22rem,1.2fr);gap:1rem;align-items:start}.box{border:1px solid var(--line);border-radius:var(--radius);background:#fbf7ee;padding:.8rem}.box h3{margin-top:0}.number-track{display:grid;gap:.25rem;margin-bottom:.7rem}.heat-track{grid-template-columns:repeat(10,minmax(2rem,1fr))}.awareness-track{grid-template-columns:repeat(8,minmax(2rem,1fr))}.clock-track{grid-template-columns:repeat(10,minmax(1.7rem,1fr))}.number-track button{min-height:2rem;padding:.15rem;background:#f8f4ec}.number-track button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:900}.hidden-segment{display:none}.state-line{display:flex;align-items:baseline;justify-content:space-between;gap:.75rem;margin-bottom:.7rem}.state-line strong{font-family:Georgia,"Times New Roman",serif;font-size:1.4rem}.state-line span{color:var(--muted);font-weight:800}.ref-list{display:grid;gap:.45rem;margin:0;padding:0;list-style:none}.ref-list li{border-left:3px solid var(--accent2);background:rgba(46,96,112,.08);padding:.4rem .55rem;font-size:.9rem}.validation{display:grid;gap:.4rem;margin-top:.75rem}.validation p{margin:0;padding:.45rem .55rem;border-radius:6px;border:1px solid transparent;font-size:.9rem}.validation .ok{color:var(--good);border-color:rgba(42,101,77,.25);background:rgba(42,101,77,.08)}.validation .warn{color:var(--warn);border-color:rgba(148,98,13,.25);background:rgba(148,98,13,.1)}.validation .bad{color:var(--bad);border-color:rgba(154,40,34,.25);background:rgba(154,40,34,.08)}.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(15rem,1fr));gap:.55rem}.check-card{display:grid;grid-template-columns:auto 1fr;gap:.55rem;align-items:start;padding:.62rem;border:1px solid var(--line);border-radius:7px;background:#fff}.check-card input[type=checkbox]{width:1.05rem;height:1.05rem;margin-top:.18rem}.check-card strong{display:block;font-size:.94rem}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}table{width:100%;min-width:760px;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:.45rem;text-align:left;vertical-align:top}th{background:#f0e9dd;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.02em}tr:last-child td{border-bottom:0}td.actions{width:1%;white-space:nowrap}td.check-cell{text-align:center}td.check-cell input{width:1.05rem;height:1.05rem}.row-actions,.section-tools{display:flex;justify-content:flex-end;gap:.45rem;margin-top:.55rem;flex-wrap:wrap}.section-tools{margin:-.25rem 0 .75rem}.die-control{display:grid;grid-template-columns:2.2rem minmax(4.3rem,1fr) 2.2rem;gap:.25rem;align-items:center}.die-control button{min-height:2.15rem;padding:.2rem;font-weight:900}.notes-area textarea{min-height:12rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92rem}.hidden-input{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none}@media(max-width:980px){.app-header{align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.save-status{text-align:left}.app-shell{grid-template-columns:1fr;padding-top:0}.sidebar{display:none}.mobile-nav{display:block}.track-layout,.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}}@media(max-width:620px){.toolbar button{flex:1 1 9rem}section{padding:.75rem}.heat-track{grid-template-columns:repeat(5,minmax(2.1rem,1fr))}.awareness-track{grid-template-columns:repeat(4,minmax(2.1rem,1fr))}.clock-track{grid-template-columns:repeat(5,minmax(2.1rem,1fr))}}@media print{:root{--bg:#fff;--panel:#fff;--ink:#000;--muted:#333;--line:#888;--shadow:none}body{background:#fff}.app-header,.sidebar,.mobile-nav,.section-tools,.row-actions,.actions,.no-print{display:none!important}.app-shell{display:block;max-width:none;padding:0}section{break-inside:avoid;box-shadow:none;border-radius:0;margin:0 0 .35in;padding:.15in 0}input,select,textarea{border:0;padding:0;min-height:auto}.number-track button{display:none}.number-track button.active{display:inline-block;color:#000;background:#fff;font-weight:900}.table-wrap{border:0;overflow:visible}table{min-width:0;font-size:9pt}.box,.check-card{break-inside:avoid}}
  </style>
</head>
<body>
  <header class="app-header"><div class="brand"><h1>Operation Manager</h1><p>Dark Heresy Spire mission objective dashboard</p></div><div class="toolbar no-print"><span class="save-status" id="saveStatus">Ready</span><button id="saveNow" type="button">Save</button><button id="exportJson" type="button">Export JSON</button><button id="importJson" type="button">Import JSON</button><button id="printSheet" type="button">Print</button><button id="newSheet" class="danger" type="button">New / Clear</button><input class="hidden-input" id="importFile" type="file" accept="application/json,.json"></div></header>
  <select class="mobile-nav no-print" id="mobileNav" aria-label="Jump to section"></select>
  <div class="app-shell"><nav class="sidebar no-print" id="sidebar" aria-label="Sheet sections"></nav><main id="app"></main></div>
  <script>
    (function(){
      "use strict";
      var STORAGE_KEY="dhspire.operation.v1",DICE=["","D3","D6","D8","D10"],DIFF=["Safe","Risky","Dangerous","Impossible"],RES=["Body","Mind","Shadow","Authority","Corruption"];
      var HEAT=[{min:0,max:2,name:"Ghosts",meaning:"The cell is unseen, dismissed, or hidden beneath a plausible fiction."},{min:3,max:5,name:"Rumors",meaning:"Someone knows something is wrong. Questions begin."},{min:6,max:8,name:"Hunted",meaning:"Enemies, authorities, rivals, or witnesses are actively moving."},{min:9,max:99,name:"Burned",meaning:"Quiet completion is no longer possible without major sacrifice."}];
      var AWARE=["Nothing. The cell is invisible.","Something is wrong.","Someone is investigating.","A covert cell is active.","The Inquisition may be involved.","They know the cell's methods.","They know names, faces, aliases, gene-signs, or soul-impressions.","They strike first."];
      var CLUE_TYPES=["Physical: corpse, mutation, ritual mark, xenos residue, weapon burn","Documentary: ledger, prayer rota, shipping manifest, sealed confession","Social: witness, rumor, informant, guilty official, frightened servant","Occult: Warp stain, dream, possession scar, daemonic name, prophetic echo","Technical: cogitator logs, pict-feed, scrapcode, auspex trace","Institutional: missing tithe, falsified order, impossible promotion, archive gap"];
      var EXIT=["0-2 Ghost Exit: Clear Heat, preserve Cover, or gain tempo.","3-5 Rumor Exit: Start next related Operation at Heat 1, create rumor, or mark Shadow stress.","6-8 Hunted Exit: Start next related Operation at Heat 2, increase Awareness, mark Patron Notice, or risk an asset.","9+ Burned Exit: Lose Patience, increase Awareness, burn Cover/Contact, trigger faction response, or accept Patron correction."];
      var SECTIONS=[["guide","Guide"],["identity","Identity"],["checklist","Checklist"],["tracks","Heat & Awareness"],["clues","Clues"],["clocks","Clocks"],["opposition","Opposition"],["situations","Situations"],["requisitions","Requisitions"],["fallout","Fallout"],["end","End"],["notes","Notes"]];
      var state=loadState(),timer=null,fieldCounter=0;
      function def(){return{identity:{mission:"",operation:"",objective:"",startingHeat:"",startingAwareness:"",opposition:"",location:"",coreClue:"",complication:"",exitCondition:""},checklist:["Objective","Opposition","Starting Heat","Enemy Awareness","At least one Core Clue","At least two optional clues","One environmental pressure","One faction pressure","One possible Fallout prompt","One Requisition opportunity","One enemy reaction if ignored","One quiet completion route","One loud completion route","One disastrous failure route"].map(function(x){return{element:x,ready:false,notes:""}}),heat:{current:0,moves:[{threshold:"Heat 3: Rumors",triggered:false,move:""},{threshold:"Heat 6: Hunted",triggered:false,move:""},{threshold:"Heat 9: Burned",triggered:false,move:""}]},awareness:0,clues:{coreRevelation:"",coreClue:"",optional1:"",optional2:"",optional3:"",falseLead:"",dangerousTruth:"",whoKnows:"",whoLies:"",whoDies:""},clocks:[{clock:"",segments:4,current:0,advances:"",full:""},{clock:"",segments:6,current:0,advances:"",full:""},{clock:"",segments:8,current:0,advances:"",full:""}],opposition:{name:"",type:"",objective:"",instinct:"",tell:"",difficulty:"Risky",resistance:"",stressDie:"D6",protection:"",tags:"",clueResource:""},responses:[["If ignored",""],["Heat 3",""],["Heat 6",""],["Heat 9",""],["Awareness 3",""],["Awareness 5",""],["Awareness 7",""]].map(function(x){return{state:x[0],response:x[1]}}),situations:[{situation:"",location:"",tension:"",risk:""},{situation:"",location:"",tension:"",risk:""},{situation:"",location:"",tension:"",risk:""}],requisitions:[{opportunity:"",resource:"D6",cost:""},{opportunity:"",resource:"D6",cost:""}],fallout:RES.map(function(r){return{resistance:r,prompt:""}}),end:[["Was the objective completed?",""],["What truth was revealed?",""],["What truth was hidden?",""],["Who knows the cell was involved?",""],["What evidence remains?",""],["What did the enemy learn?",""],["What happens next?",""]].map(function(x){return{question:x[0],answer:x[1]}}),notes:""}}
      function loadState(){try{var raw=localStorage.getItem(STORAGE_KEY);if(raw){var p=JSON.parse(raw);if(p&&p.operation)return merge(def(),p.operation)}}catch(e){console.warn(e)}return def()}
      function merge(a,b){Object.keys(b||{}).forEach(function(k){if(Array.isArray(b[k]))a[k]=b[k];else if(b[k]&&typeof b[k]==="object"&&a[k]&&typeof a[k]==="object"&&!Array.isArray(a[k]))a[k]=merge(a[k],b[k]);else a[k]=b[k]});return a}
      function save(manual){localStorage.setItem(STORAGE_KEY,JSON.stringify({version:1,updatedAt:new Date().toISOString(),operation:state}));status(manual?"Saved now":"Auto-saved")}function schedule(){status("Unsaved changes");clearTimeout(timer);timer=setTimeout(function(){save(false)},350)}function status(t){document.getElementById("saveStatus").textContent=t}
      function get(path){return path.split(".").reduce(function(o,k){return o?o[k]:undefined},state)}function set(path,val){var p=path.split("."),o=state;for(var i=0;i<p.length-1;i++)o=o[p[i]];o[p[p.length-1]]=val;schedule();dynamic()}
      function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function slug(v){return String(v).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}
      function opts(list,selected,blank){var h=blank?'<option value=""></option>':"";list.forEach(function(o){var v=Array.isArray(o)?o[0]:o,l=Array.isArray(o)?o[1]:o;h+='<option value="'+esc(v)+'"'+(String(v)===String(selected)?" selected":"")+">"+esc(l)+"</option>"});return h}
      function field(label,path,type,options){var val=get(path)||"",id="f-"+slug(path)+"-"+fieldCounter++;if(type==="textarea")return'<label for="'+id+'"><span>'+esc(label)+'</span><textarea id="'+id+'" data-path="'+esc(path)+'">'+esc(val)+'</textarea></label>';if(type==="select")return'<label for="'+id+'"><span>'+esc(label)+'</span><select id="'+id+'" data-path="'+esc(path)+'">'+opts(options,val,true)+'</select></label>';return'<label for="'+id+'"><span>'+esc(label)+'</span><input id="'+id+'" data-path="'+esc(path)+'" value="'+esc(val)+'"></label>'}
      function render(){fieldCounter=0;document.getElementById("sidebar").innerHTML=SECTIONS.map(function(s){return'<a href="#'+s[0]+'">'+s[1]+"</a>"}).join("");document.getElementById("mobileNav").innerHTML='<option value="">Jump to section</option>'+SECTIONS.map(function(s){return'<option value="'+s[0]+'">'+s[1]+"</option>"}).join("");document.getElementById("app").innerHTML=guide()+identity()+checklist()+tracks()+clues()+clocks()+opposition()+situations()+requisitions()+fallout()+end()+notes();bind();dynamic()}
      function guide(){return'<section id="guide"><h2>Operation Guide</h2><div class="track-layout"><div class="box"><h3>Readiness</h3><div id="validation" class="validation"></div></div><div class="box"><h3>Clue Types</h3><ul class="ref-list">'+CLUE_TYPES.map(function(x){return"<li>"+esc(x)+"</li>"}).join("")+"</ul></div></div></section>"}
      function identity(){return'<section id="identity"><h2>Operation Identity</h2><div class="grid cols-4">'+field("Mission","identity.mission")+field("Operation","identity.operation")+field("Objective","identity.objective","textarea")+field("Starting Heat","identity.startingHeat")+field("Starting Enemy Awareness","identity.startingAwareness")+field("Primary Opposition","identity.opposition")+field("Key Location","identity.location")+field("Core Clue","identity.coreClue")+field("Complication","identity.complication","textarea")+field("Exit Condition","identity.exitCondition","textarea")+"</div></section>"}
      function checklist(){return'<section id="checklist"><h2>Operation Checklist</h2>'+table("checklist",[["element","Element"],["ready","Ready?","checkbox"],["notes","Notes"]],{add:"Add Checklist Item"})+"</section>"}
      function tracks(){var h=Number(state.heat.current)||0,hs=heatState(h),a=Number(state.awareness)||0;return'<section id="tracks"><h2>Heat & Enemy Awareness</h2><div class="track-layout"><div class="box"><h3>Heat</h3><div class="state-line"><strong>'+h+(h>=9?"+":"")+'</strong><span>'+hs.name+'</span></div><div class="number-track heat-track">'+Array.from({length:10},function(_,i){return'<button type="button" data-number="heat.current" data-value="'+i+'" class="'+(h===i?"active":"")+'">'+(i===9?"9+":i)+"</button>"}).join("")+'</div><p class="section-intro">'+esc(hs.meaning)+'</p><h3>Enemy Awareness</h3><div class="state-line"><strong>'+a+'</strong><span>Awareness</span></div><div class="number-track awareness-track">'+Array.from({length:8},function(_,i){return'<button type="button" data-number="awareness" data-value="'+i+'" class="'+(a===i?"active":"")+'">'+i+"</button>"}).join("")+'</div><p class="section-intro">'+esc(AWARE[a])+'</p></div><div class="box"><h3>Heat Moves Triggered</h3>'+table("heat.moves",[["threshold","Threshold"],["triggered","Triggered?","checkbox"],["move","Move / Consequence"]],{add:"Add Heat Move"})+"</div></div></section>"}
      function clues(){return'<section id="clues"><h2>Clue Web</h2><p class="section-intro">Avoid a single point of failure: one core revelation, one core clue, and several alternate paths.</p><div class="grid cols-2">'+field("Core Revelation","clues.coreRevelation","textarea")+field("Core Clue","clues.coreClue","textarea")+field("Optional Clue 1","clues.optional1","textarea")+field("Optional Clue 2","clues.optional2","textarea")+field("Optional Clue 3","clues.optional3","textarea")+field("False Lead","clues.falseLead","textarea")+field("Dangerous Truth","clues.dangerousTruth","textarea")+field("Who Knows","clues.whoKnows","textarea")+field("Who Lies","clues.whoLies","textarea")+field("Who Dies If This Is Found","clues.whoDies","textarea")+"</div></section>"}
      function clocks(){return'<section id="clocks"><h2>Operation Clocks</h2>'+table("clocks",[["clock","Clock"],["segments","Segments","select",[4,6,8,10]],["current","Current","clock"],["advances","What Advances It"],["full","What Happens When Full"]],{add:"Add Clock"})+"</section>"}
      function opposition(){return'<section id="opposition"><h2>Opposition</h2><div class="grid cols-4">'+field("Name","opposition.name")+field("Type","opposition.type")+field("Objective","opposition.objective","textarea")+field("Instinct","opposition.instinct","textarea")+field("Tell","opposition.tell")+field("Difficulty","opposition.difficulty","select",DIFF)+field("Resistance","opposition.resistance")+field("Stress Die","opposition.stressDie","select",DICE)+field("Protection","opposition.protection")+field("Tags","opposition.tags")+field("Clue / Resource","opposition.clueResource","textarea")+'</div><h3>Opposition Responses</h3>'+table("responses",[["state","State"],["response","Opposition Response","textarea"]],{add:"Add Response"})+"</section>"}
      function situations(){return'<section id="situations"><h2>Key Situations</h2>'+table("situations",[["situation","Situation"],["location","Location"],["tension","Immediate Tension"],["risk","Clue / Risk"]],{add:"Add Situation"})+"</section>"}
      function requisitions(){return'<section id="requisitions"><h2>Requisition Opportunities</h2>'+table("requisitions",[["opportunity","Opportunity"],["resource","Resource","die"],["cost","Cost / Risk"]],{add:"Add Requisition"})+"</section>"}
      function fallout(){return'<section id="fallout"><h2>Fallout Prompts</h2>'+table("fallout",[["resistance","Resistance","select",RES],["prompt","Possible Fallout","textarea"]],{add:"Add Fallout Prompt"})+"</section>"}
      function end(){return'<section id="end"><h2>End of Operation</h2>'+table("end",[["question","Question"],["answer","Answer","textarea"]],{add:"Add End Question"})+'<h3>Heat Exit</h3><ul class="ref-list">'+EXIT.map(function(x){return"<li>"+esc(x)+"</li>"}).join("")+"</ul></section>"}
      function notes(){return'<section id="notes" class="notes-area"><h2>Operation Notes</h2>'+field("Notes","notes","textarea")+"</section>"}
      function table(path,cols,options){var rows=get(path)||[],h='<div class="table-wrap"><table><thead><tr>'+cols.map(function(c){return"<th>"+esc(c[1])+"</th>"}).join("")+'<th class="actions">Actions</th></tr></thead><tbody>';rows.forEach(function(r,i){h+="<tr>"+cols.map(function(c){var key=c[0],type=c[2]||"input",cell=path+"."+i+"."+key,val=r[key];if(type==="checkbox")return'<td class="check-cell"><input type="checkbox" data-check="'+esc(cell)+'"'+(val?" checked":"")+'></td>';if(type==="textarea")return'<td><textarea data-path="'+esc(cell)+'">'+esc(val||"")+"</textarea></td>";if(type==="select")return'<td><select data-path="'+esc(cell)+'">'+opts(c[3],val,false)+"</select></td>";if(type==="die")return"<td>"+die(cell,val||"")+"</td>";if(type==="clock")return"<td>"+clockCell(path,i,Number(r.segments)||4,Number(val)||0)+"</td>";return'<td><input data-path="'+esc(cell)+'" value="'+esc(val||"")+'"></td>'}).join("")+'<td class="actions"><button class="danger" type="button" data-remove-row="'+esc(path)+'" data-index="'+i+'">Remove</button></td></tr>'});return h+'</tbody></table></div><div class="row-actions"><button type="button" data-add-row="'+esc(path)+'">'+esc(options.add||"Add Row")+"</button></div>"}
      function die(path,val){return'<div class="die-control"><button type="button" data-die-step="'+esc(path)+'" data-dir="-1">-</button><select data-path="'+esc(path)+'">'+opts(DICE,val,false)+'</select><button type="button" data-die-step="'+esc(path)+'" data-dir="1">+</button></div>'}
      function clockCell(path,index,segments,current){return'<div class="number-track clock-track">'+Array.from({length:11},function(_,i){return'<button type="button" data-clock-path="'+esc(path)+'" data-index="'+index+'" data-value="'+i+'" class="'+(current===i?"active":"")+(i>segments?" hidden-segment":"")+'">'+i+"</button>"}).join("")+"</div>"}
      function bind(){document.querySelectorAll("[data-path]").forEach(function(el){el.addEventListener("input",function(){set(el.getAttribute("data-path"),el.value)});el.addEventListener("change",function(){set(el.getAttribute("data-path"),el.value);render()})});document.querySelectorAll("[data-check]").forEach(function(el){el.addEventListener("change",function(){set(el.getAttribute("data-check"),el.checked)})});document.querySelectorAll("[data-number]").forEach(function(b){b.addEventListener("click",function(){set(b.getAttribute("data-number"),Number(b.getAttribute("data-value")));render()})});document.querySelectorAll("[data-clock-path]").forEach(function(b){b.addEventListener("click",function(){get(b.getAttribute("data-clock-path"))[Number(b.getAttribute("data-index"))].current=Number(b.getAttribute("data-value"));schedule();render()})});document.querySelectorAll("[data-die-step]").forEach(function(b){b.addEventListener("click",function(){stepDie(b.getAttribute("data-die-step"),Number(b.getAttribute("data-dir")))})});document.querySelectorAll("[data-add-row]").forEach(function(b){b.addEventListener("click",function(){addRow(b.getAttribute("data-add-row"))})});document.querySelectorAll("[data-remove-row]").forEach(function(b){b.addEventListener("click",function(){removeRow(b.getAttribute("data-remove-row"),Number(b.getAttribute("data-index")))})})}
      function dynamic(){var msgs=[],ready=state.checklist.filter(function(x){return x.ready}).length;if(!state.identity.operation)msgs.push(["warn","Operation name is empty."]);if(!state.identity.objective)msgs.push(["warn","Objective is empty."]);if(!state.identity.coreClue&&!state.clues.coreClue)msgs.push(["bad","Core Clue is empty."]);if(ready<state.checklist.length)msgs.push(["warn","Checklist ready: "+ready+" / "+state.checklist.length+"."]);if(state.heat.current>=3)msgs.push(["warn","Heat has reached a threshold. Check Heat Moves."]);if(!msgs.length)msgs.push(["ok","Operation checks look solid."]);var v=document.getElementById("validation");if(v)v.innerHTML=msgs.map(function(m){return'<p class="'+m[0]+'">'+esc(m[1])+"</p>"}).join("")}
      function heatState(v){return HEAT.find(function(h){return v>=h.min&&v<=h.max})||HEAT[0]}
      function template(path){var t={"checklist":{element:"",ready:false,notes:""},"heat.moves":{threshold:"",triggered:false,move:""},"clocks":{clock:"",segments:4,current:0,advances:"",full:""},"responses":{state:"",response:""},"situations":{situation:"",location:"",tension:"",risk:""},"requisitions":{opportunity:"",resource:"D6",cost:""},"fallout":{resistance:"Body",prompt:""},"end":{question:"",answer:""}};return JSON.parse(JSON.stringify(t[path]||{}))}
      function addRow(p){get(p).push(template(p));schedule();render()}function removeRow(p,i){get(p).splice(i,1);schedule();render()}function stepDie(p,d){var cur=get(p)||"",i=DICE.indexOf(cur);if(i<0)i=0;i=Math.max(0,Math.min(DICE.length-1,i+d));set(p,DICE[i]);render()}
      function exportJson(){save(true);var blob=new Blob([JSON.stringify({version:1,updatedAt:new Date().toISOString(),operation:state},null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a"),name=state.identity.operation?state.identity.operation.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""):"operation";a.href=url;a.download=name+".json";a.click();URL.revokeObjectURL(url)}
      function importJson(file){var r=new FileReader();r.onload=function(){try{var p=JSON.parse(r.result);state=merge(def(),p.operation||p);save(true);render()}catch(e){alert("Import failed: this does not look like valid operation JSON.")}};r.readAsText(file)}
      document.getElementById("saveNow").addEventListener("click",function(){save(true)});document.getElementById("exportJson").addEventListener("click",exportJson);document.getElementById("importJson").addEventListener("click",function(){document.getElementById("importFile").click()});document.getElementById("importFile").addEventListener("change",function(e){if(e.target.files&&e.target.files[0])importJson(e.target.files[0]);e.target.value=""});document.getElementById("printSheet").addEventListener("click",function(){window.print()});document.getElementById("newSheet").addEventListener("click",function(){if(confirm("Clear this operation from the browser and start fresh? Export first if you want a backup.")){state=def();save(true);render()}});document.getElementById("mobileNav").addEventListener("change",function(e){if(e.target.value)document.getElementById(e.target.value).scrollIntoView();e.target.value=""});
      render();save(false);
    })();
  </script>
