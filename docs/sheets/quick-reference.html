<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Reference</title>
  <style>
    :root{--bg:#f4f0e7;--panel:#fffdf8;--ink:#211f1b;--muted:#6d6559;--line:#cec2b0;--accent:#7d2b28;--accent2:#2e6070;--good:#2a654d;--warn:#94620d;--bad:#9a2822;--shadow:0 12px 28px rgba(40,32,22,.12);--radius:8px;--focus:0 0 0 3px rgba(125,43,40,.18)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}button,input,select{font:inherit}button{min-height:2.25rem;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:.42rem .72rem;cursor:pointer}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}button:focus-visible,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus)}input,select{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:.5rem .58rem}label{display:grid;gap:.28rem;color:var(--muted);font-size:.82rem;font-weight:700}.app-header{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.75rem 1rem;background:rgba(244,240,231,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:1.28rem;line-height:1.1}.brand p{margin:.12rem 0 0;color:var(--muted);font-size:.82rem}.toolbar{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:flex-end;align-items:center}.app-shell{display:grid;grid-template-columns:15rem minmax(0,1fr);gap:1rem;max-width:1500px;margin:0 auto;padding:1rem}.sidebar{position:sticky;top:5.15rem;align-self:start;max-height:calc(100vh - 6rem);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:.65rem}.sidebar a{display:block;color:var(--ink);text-decoration:none;padding:.45rem .55rem;border-radius:5px;font-size:.92rem}.sidebar a:hover{background:#eee7dc}.mobile-nav{display:none;margin:0 1rem 1rem}main{display:grid;gap:1rem;min-width:0}section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;scroll-margin-top:5.25rem}section h2{margin:0 0 .85rem;font-family:Georgia,"Times New Roman",serif;font-size:1.25rem;line-height:1.15}h3{margin:1rem 0 .55rem;font-size:1rem}.grid{display:grid;gap:.75rem}.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.box{border:1px solid var(--line);border-radius:var(--radius);background:#fbf7ee;padding:.8rem}.box h3:first-child{margin-top:0}.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(14rem,1fr));gap:.55rem}.check-card{display:grid;grid-template-columns:auto 1fr;gap:.55rem;align-items:start;padding:.62rem;border:1px solid var(--line);border-radius:7px;background:#fff}.check-card input{width:1.05rem;height:1.05rem;margin-top:.18rem}.result-box{display:grid;gap:.35rem;border-left:4px solid var(--accent2);background:rgba(46,96,112,.08);padding:.65rem}.dice-row{display:flex;flex-wrap:wrap;gap:.35rem}.die{display:inline-grid;place-items:center;min-width:2.15rem;min-height:2.15rem;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:900}.die.removed{opacity:.35;text-decoration:line-through}.ref-list{display:grid;gap:.45rem;margin:0;padding:0;list-style:none}.ref-list li{border-left:3px solid var(--accent2);background:rgba(46,96,112,.08);padding:.4rem .55rem;font-size:.9rem}.ref-list strong{display:block}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}table{width:100%;min-width:620px;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:.45rem;text-align:left;vertical-align:top}th{background:#f0e9dd;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.02em}tr:last-child td{border-bottom:0}.search{max-width:34rem}.hidden{display:none!important}@media(max-width:980px){.app-header{align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.app-shell{grid-template-columns:1fr;padding-top:0}.sidebar{display:none}.mobile-nav{display:block}.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}}@media(max-width:620px){.toolbar button{flex:1 1 9rem}section{padding:.75rem}}@media print{:root{--bg:#fff;--panel:#fff;--ink:#000;--muted:#333;--line:#888;--shadow:none}body{background:#fff}.app-header,.sidebar,.mobile-nav,.no-print{display:none!important}.app-shell{display:block;max-width:none;padding:0}section{break-inside:avoid;box-shadow:none;border-radius:0;margin:0 0 .3in;padding:.12in 0}.box,.check-card{break-inside:avoid}.table-wrap{border:0;overflow:visible}table{min-width:0;font-size:9pt}}
  </style>
</head>
<body>
  <header class="app-header"><div class="brand"><h1>Quick Reference</h1><p>Dark Heresy Spire table-facing rules</p></div><div class="toolbar no-print"><input class="search" id="search" placeholder="Filter reference sections"><button id="printPage" type="button">Print</button></div></header>
  <select class="mobile-nav no-print" id="mobileNav" aria-label="Jump to section"></select>
  <div class="app-shell"><nav class="sidebar no-print" id="sidebar" aria-label="Reference sections"></nav><main id="app"></main></div>
  <script>
    (function(){
      "use strict";
      var SECTIONS=[["roller","Roll Helper"],["core","Core Roll"],["difficulty","Difficulty"],["results","Results"],["stress","Stress & Fallout"],["heat","Heat & Awareness"],["cover","Cover & Rosette"],["patron","Patron Notice"],["psychic","Psychic / Forbidden"],["beats","Beats"],["gear","Gear & Resources"],["requisition","Requisition"],["situation","End of Situation"]];
      var DIFF={Safe:0,Risky:1,Dangerous:2,Impossible:2},RESULTS=[["1","Critical failure. Fail and take double stress."],["2-5","Failure. Do not get what you wanted and take stress."],["6-7","Success at cost. Get what you wanted, but take stress."],["8-9","Clean success."],["10","Critical success. Extra benefit; attacks add +1 stress inflicted for each 10 rolled."]];
      function esc(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
      function table(headers,rows){return'<div class="table-wrap"><table><thead><tr>'+headers.map(function(h){return"<th>"+esc(h)+"</th>"}).join("")+"</tr></thead><tbody>"+rows.map(function(r){return"<tr>"+r.map(function(c){return"<td>"+c+"</td>"}).join("")+"</tr>"}).join("")+"</tbody></table></div>"}
      function list(items){return'<ul class="ref-list">'+items.map(function(i){return"<li>"+i+"</li>"}).join("")+"</ul>"}
      function render(){document.getElementById("sidebar").innerHTML=SECTIONS.map(function(s){return'<a href="#'+s[0]+'">'+s[1]+"</a>"}).join("");document.getElementById("mobileNav").innerHTML='<option value="">Jump to section</option>'+SECTIONS.map(function(s){return'<option value="'+s[0]+'">'+s[1]+"</option>"}).join("");document.getElementById("app").innerHTML=roller()+core()+difficulty()+results()+stress()+heat()+cover()+patron()+psychic()+beats()+gear()+requisition()+situation();bind();updateRoll();updateFallout()}
      function roller(){return'<section id="roller" data-title="Roll Helper"><h2>Roll Helper</h2><div class="grid cols-2"><div class="box"><h3>Dice Pool</h3><div class="check-grid">'+["Relevant Skill","Relevant Domain","Mastery","Help","Gear / Resource / Advantage"].map(function(x,i){return'<label class="check-card"><input type="checkbox" class="pool" data-index="'+i+'"><strong>'+x+"</strong></label>"}).join("")+'</div><h3>Difficulty</h3><select id="difficultySelect"><option>Safe</option><option>Risky</option><option>Dangerous</option><option>Impossible</option></select><div class="section-tools no-print" style="margin-top:.75rem"><button class="primary" id="rollBtn" type="button">Roll Pool</button></div></div><div class="box"><h3>Result</h3><div id="rollOutput" class="result-box"></div></div></div><h3>Fallout Check Helper</h3><div class="grid cols-3"><label>Current Stress<input id="stressValue" type="number" min="0" max="20" value="0"></label><label>Fallout Roll<input id="falloutRoll" type="number" min="1" max="10" value="1"></label><label>Severity<input id="severityOut" readonly></label></div><div id="falloutOutput" class="result-box" style="margin-top:.75rem"></div></section>'}
      function core(){return'<section id="core" data-title="Core Roll"><h2>Core Roll</h2><p>Build a pool of D10s. Start with <strong>1D10</strong>. Add +1D10 for each relevant Skill, Domain, Mastery, Help, and Gear / Resource / Advantage. Roll the pool, then apply Difficulty.</p>'+table(["Source","Add?"],[["Relevant Skill","Yes / no"],["Relevant Domain","Yes / no"],["Mastery","Yes / no"],["Help","Yes / no"],["Gear / Resource / Advantage","Yes / no"]])+"</section>"}
      function difficulty(){return'<section id="difficulty" data-title="Difficulty"><h2>Difficulty</h2>'+table(["Difficulty","Effect"],[["<strong>Safe</strong>","Roll normally."],["<strong>Risky</strong>","Remove the highest die after rolling."],["<strong>Dangerous</strong>","Remove the two highest dice after rolling."],["<strong>Impossible</strong>","Roll as Dangerous; stress, fallout, exposure, or escalation remains possible even on success."]])+"<p>If all dice are removed, treat the final result as <strong>1</strong>.</p></section>"}
      function results(){return'<section id="results" data-title="Results"><h2>Results</h2>'+table(["Highest Remaining Die","Result"],RESULTS.map(function(r){return["<strong>"+r[0]+"</strong>",r[1]]}))+"</section>"}
      function stress(){return'<section id="stress" data-title="Stress Fallout Resistances"><h2>Stress & Fallout</h2><div class="grid cols-2"><div>'+table(["Threat Level","Stress Die","Example"],[["Incidental","D3","Minor suspicion, bruises, embarrassment"],["Risky","D6","Armed cultists, hard interrogation, dangerous stealth"],["Dangerous","D8","Heavy weapons, psychic threat, noble exposure"],["Catastrophic","D10","Daemonhost, orbital politics, public scandal"]])+'</div><div>'+table(["Resistance","What It Measures"],[["Body","Injury, exhaustion, poison, radiation, disease, deprivation"],["Mind","Fear, trauma, guilt, doubt, obsession, memory damage"],["Shadow","Cover, secrecy, subtlety, aliases, surveillance, evidence"],["Authority","Patron trust, faction standing, legality, chain of command"],["Corruption","Warp-taint, forbidden knowledge, xenos influence, mutation, possession"]])+'</div></div><h3>Fallout Check</h3>'+list(["Add stress result to the relevant Resistance.","Roll 1D10.","If the result is lower than current stress in that Resistance, suffer Fallout."])+table(["Severity","Stress Range","Meaning"],[["Minor","1-4","Immediate trouble, short-term harm, fixable problem"],["Moderate","5-8","Serious injury, lasting pressure, dangerous scrutiny"],["Severe","9+","Permanent harm, destroyed cover, major corruption, mission-changing consequence"],["Critical","Special","Character-ending or campaign-altering consequence"]])+"<h3>Clearing Stress After Fallout</h3>"+table(["Fallout Severity","Stress Cleared"],[["Minor","Clear all stress in the triggering Resistance."],["Moderate","Clear all stress in the triggering Resistance and D3 stress from one other Resistance."],["Severe","Clear all stress in the triggering Resistance and all stress from one other Resistance."],["Critical","Clear stress only if the character survives in playable form."]])+"</section>"}
      function heat(){return'<section id="heat" data-title="Heat Enemy Awareness"><h2>Heat & Enemy Awareness</h2><div class="grid cols-2"><div>'+table(["Heat","State","Meaning"],[["0-2","<strong>Ghosts</strong>","Hidden. The cell chooses the moment."],["3-5","<strong>Rumors</strong>","Someone noticed. Cover is being tested."],["6-8","<strong>Hunted</strong>","Enemies, authorities, or rivals are moving."],["9+","<strong>Burned</strong>","Quiet completion is no longer possible without major sacrifice."]])+'</div><div>'+table(["Awareness","What They Know"],[["0","Nothing. The cell is invisible."],["1","Something is wrong."],["2","Someone is investigating."],["3","A covert cell is active."],["4","The Inquisition may be involved."],["5","They know the cell's methods."],["6","They know names, faces, aliases, gene-signs, or soul-impressions."],["7","They strike first."]])+'</div></div><h3>Heat Rises From</h3>'+list(["Witnesses","Records","Bodies","Psychic traces / Warp Trace","Public authority","Forbidden evidence","Obvious violence","Compromised cover","Factional complaints"])+"</section>"}
      function cover(){return'<section id="cover" data-title="Cover Rosette Authority"><h2>Cover & Rosette</h2><h3>Cover Damage</h3>'+table(["Damage","Effect"],[["Scuffed","Step Cover down one die size, or take D3 Shadow stress."],["Questioned","The next roll relying on Cover is Risky."],["Flagged","Cover works, but its use raises Heat by 1 until repaired."],["Compromised","Cover only works in limited places or with additional proof."],["Exposed","Burn Cover or increase Heat by 1."],["Collapsed","Burn Cover and increase Heat by 1. If Patron-backed, mark Patron Notice."]])+"<h3>Flashing the Rosette</h3>"+list(["Benefit: Mastery on Command, Procure, or Investigate; force compliance; seize jurisdiction; bypass restrictions; command access.","Cost: Heat +1 private or contained, Heat +2 public or recorded, D6 Authority stress, D6 Shadow stress, Patron Notice, Liability, or factional enemy."])+"</section>"}
      function patron(){return'<section id="patron" data-title="Patron Notice"><h2>Patron Notice</h2>'+list(["A Major or Severe Beat is completed.","The cell publicly invokes Inquisitorial authority.","A Patron Boon is used loudly or dramatically.","Heat reaches 3, 6, or 9 for the first time in an Operation.","The cell suffers Severe Authority, Shadow, or Corruption fallout.","The cell delays or contradicts the Mandate.","A Red Line is approached."])+"<p>At <strong>3 Patron Notice</strong>, the Patron makes a Move, then clear Patron Notice.</p></section>"}
      function psychic(){return'<section id="psychic" data-title="Psychic Forbidden Warp Trace"><h2>Psychic / Forbidden Calibration</h2>'+table(["Question","Use"],[["Is the danger present before the roll?","Difficulty."],["Does the acolyte personally pay?","Stress."],["Did outsiders see or record it?","Heat."],["Did the enemy learn a method, signature, or weakness?","Enemy Awareness."],["Did occult residue remain?","Warp Trace."],["Would the Patron or rival Inquisition judge this?","Patron Notice, Patience, Red Line, or Authority stress."],["Should the cost mature later?","Burden or clock."]])+"<p>On <strong>7 or lower</strong>, psychic powers usually add Corruption stress unless the power says otherwise. A Forbidden Method may simply work and charge a cost when uncertainty is not interesting.</p></section>"}
      function beats(){return'<section id="beats" data-title="Beats Advancement"><h2>Beats</h2>'+table(["Beat Type","Theme"],[["Duty","Obedience, purity, mission, command, sacrifice, official violence"],["Humanity","Mercy, loyalty, doubt, civilian life, confession, restraint"],["Radical","Forbidden tools, expedience, secrecy, corruption, leverage, survival"]])+table(["Beat Completed","Reward"],[["Minor Beat","Minor Advance or D6 Requisition"],["Major Beat","Major Advance or D8 Requisition"],["Severe Beat","Severe Advance, D10 Requisition, or permanent Patron Boon"]])+"</section>"}
      function gear(){return'<section id="gear" data-title="Equipment Gear Resources Tags"><h2>Gear & Resources</h2><p><strong>Equipment = Chassis + Modules + Tags + Effect + Resource Die + Burden Profile</strong></p>'+table(["Resource Die","Equipment Quality"],[["D3","Failing, temporary, improvised, nearly spent, badly damaged, or highly conditional."],["D6","Standard, common, functional, ordinary, locally available, or limited."],["D8","Reliable, sanctioned, well-maintained, military, specialist, or strongly supported."],["D10","Rare, master-crafted, restricted, sacred, highly classified, or unusually potent."]])+"<h3>Common Gear Tags</h3>"+table(["Tag","Quick Effect"],[["Accurate","Set up before combat to roll with Mastery."],["Bolt/Brutal","Roll stress twice and keep the higher result; Bolt applies against unarmoured targets."],["Burning/Spread","Burning adds D3 recurring stress; Spread gives nearby creatures D3 stress."],["Close/Ranged/Far Range","Defines Melee, Ranged, or Extreme range use."],["Dangerous/Plasma/Wyrd","Maximum stress creates Body, doubled stress, or Corruption backlash."],["Disposable","Can be burned for one strong effect, then destroyed or reduced to D3."],["Forbidden","Use may cause Corruption, Shadow, Patron Notice, faction hostility, or Red Line pressure."],["Limited X/One-Shot/Reload","Tracks limited uses, single use, or time spent reloading."],["Loud/Volatile","Maximum stress or failure increases Heat or marks Shadow stress if exposed."],["Melta/Piercing","Melta ignores Protection; Piercing ignores Body Protection."],["Reliable","Ignore the first step-down, jam, misfire, supply issue, or maintenance complication each Operation."],["Restricted","If inspected by officials, mark D3 Authority stress or create a faction question."],["Traceable","If left behind, used publicly, scanned, logged, or inspected, it creates evidence."],["Warded","Protection 1 against Corruption, Warp Trace, possession, hexes, or psychic intrusion."]])+"<h3>Weapon & Protection Scale</h3>"+table(["Scale","Value"],[["Unarmed","1 Body"],["Minor / improvised / concealed weapon","D3"],["Standard sidearm or melee","D6"],["Military, brutal, specialist, or heavy","D8"],["Extreme, anti-armour, plasma, melta, forbidden","D10"],["Protection 1","Light, narrow, conditional, or concealed protection."],["Protection 2","Serious, military, specialist, or restricted protection."],["Protection 3","Heavy, rare, sacred, powered, or story-level protection."]])+"</section>"}
      function requisition(){return'<section id="requisition" data-title="Requisition Procedure"><h2>Requisition Procedure</h2>'+list(["State the request.","Choose the channel: local office, Arbites, Mechanicus, Ecclesiarchy, Militarum/PDF, Underworld, Void Guild, Patron Boon, or Forbidden Source.","Determine difficulty.","Usually roll Procure + relevant Domain.","On success, receive the asset. On a cost, add Heat, stress, delay, handler, faction attention, or a Burden Profile."])+table(["Result","Requisition Outcome"],[["1","Arrives wrong, late, exposed, cursed, broken, or with a severe Burden. Take double stress or trigger a major complication."],["2-5","You do not get it, or only get it by accepting a serious cost."],["6-7","You get it, but choose or roll a Burden, Heat, Authority stress, delay, handler, or faction attention."],["8-9","You get it cleanly, within the fiction of the request."],["10","You get it cleanly, plus better Quality, extra Module, reduced Heat, useful clue, or no paper trail."]])+"</section>"}
      function situation(){return'<section id="situation" data-title="End Situation Checklist"><h2>End-of-Situation Checklist</h2>'+list(["Did anyone see what happened?","Did anyone record what happened?","Did anyone survive with useful information?","Did the cell use loud violence, psychic power, forbidden tools, or Inquisitorial authority?","Did a Cover Identity explain the event?","Did the enemy learn something specific?","Did the Patron have reason to notice?","Did any faction gain a reason to intervene?","Did any evidence remain unsecured?","Did the cell cross or approach a Red Line?"])+list(["Adjust Heat.","Adjust Enemy Awareness if needed.","Apply Shadow stress or Fallout if needed.","Trigger Heat threshold moves at 3, 6, or 9.","Mark Patron Notice if appropriate.","Tick any Operation clocks.","Announce what the players can perceive changing."])+"</section>"}
      function bind(){document.getElementById("rollBtn").addEventListener("click",roll);document.querySelectorAll(".pool,#difficultySelect").forEach(function(el){el.addEventListener("change",updateRoll)});document.getElementById("stressValue").addEventListener("input",updateFallout);document.getElementById("falloutRoll").addEventListener("input",updateFallout)}
      function poolSize(){return 1+Array.from(document.querySelectorAll(".pool")).filter(function(x){return x.checked}).length}
      function resultText(v){if(v<=1)return RESULTS[0][1];if(v<=5)return RESULTS[1][1];if(v<=7)return RESULTS[2][1];if(v<=9)return RESULTS[3][1];return RESULTS[4][1]}
      function updateRoll(){var n=poolSize(),diff=document.getElementById("difficultySelect").value,removed=DIFF[diff],remaining=Math.max(0,n-removed),final=remaining? "highest remaining die" : "1";document.getElementById("rollOutput").innerHTML="<strong>"+n+"D10 pool</strong><span>"+esc(diff)+" removes "+removed+" highest dice. Final result uses "+final+".</span>"}
      function roll(){var n=poolSize(),diff=document.getElementById("difficultySelect").value,removed=DIFF[diff],dice=Array.from({length:n},function(){return 1+Math.floor(Math.random()*10)}),sorted=dice.slice().sort(function(a,b){return b-a}),removedVals=sorted.slice(0,removed),remaining=sorted.slice(removed),final=remaining.length?Math.max.apply(null,remaining):1;document.getElementById("rollOutput").innerHTML='<strong>Final: '+final+'</strong><div class="dice-row">'+sorted.map(function(d,i){return'<span class="die '+(i<removedVals.length?"removed":"")+'">'+d+"</span>"}).join("")+'</div><span>'+esc(resultText(final))+"</span>"}
      function updateFallout(){var stress=Number(document.getElementById("stressValue").value)||0,roll=Number(document.getElementById("falloutRoll").value)||1,sev=stress>=9?"Severe":stress>=5?"Moderate":stress>=1?"Minor":"None",fallout=roll<stress;document.getElementById("severityOut").value=sev;document.getElementById("falloutOutput").innerHTML='<strong>'+esc(fallout?"Fallout triggered":"No Fallout")+'</strong><span>Roll '+roll+(fallout?" is lower than ":" is not lower than ")+"current stress "+stress+". Severity: "+sev+".</span>"}
      document.getElementById("printPage").addEventListener("click",function(){window.print()});document.getElementById("mobileNav").addEventListener("change",function(e){if(e.target.value)document.getElementById(e.target.value).scrollIntoView();e.target.value=""});document.getElementById("search").addEventListener("input",function(e){var q=e.target.value.toLowerCase();document.querySelectorAll("main section").forEach(function(s){s.classList.toggle("hidden",q&&s.textContent.toLowerCase().indexOf(q)<0)})});
      render();
    })();
  </script>
</body>
</html>
